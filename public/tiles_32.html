<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #222; color: white; display: flex; flex-wrap: wrap; gap: 5px; font-family: sans-serif; }
    .tile { width: 64px; height: 80px; border: 1px solid #555; display: inline-block; text-align: center; }
    .label { background: rgba(0,0,0,0.8); font-size: 14px; font-weight: bold; padding: 2px;}
    .bg { image-rendering: pixelated; width: 64px; height: 64px; } /* scale 2x for visibility */
  </style>
</head>
<body>
<script>
const img = new Image();
// Relative path since it's in public/
img.src = './assets/Denzi111023-1_processed_v3.png';
img.onload = () => {
  const offsetX = 16;
  const offsetY = 0;
  const tileW = 32;
  const tileH = 32;
  
  const cols = Math.floor((img.width - offsetX) / tileW);
  const rows = Math.floor((img.height - offsetY) / tileH);
  
  for(let y=0; y<rows; y++) {
    for(let x=0; x<cols; x++) {
      const c = document.createElement('canvas');
      c.className = 'bg';
      c.width = tileW; c.height = tileH;
      const ctx = c.getContext('2d', {willReadFrequently: true});
      ctx.drawImage(img, offsetX + x*tileW, offsetY + y*tileH, tileW, tileH, 0, 0, tileW, tileH);
      
      const data = ctx.getImageData(0,0,tileW,tileH).data;
      let empty = true;
      for(let i=3; i<data.length; i+=4) {
        if (data[i] > 0) { empty = false; break; }
      }
      
      if (!empty) {
        const d = document.createElement('div');
        d.className = 'tile';
        const l = document.createElement('div');
        l.className = 'label';
        l.innerText = `X:${x}, Y:${y}`;
        d.appendChild(l);
        d.appendChild(c);
        document.body.appendChild(d);
      }
    }
  }
};
img.onerror = () => {
    document.body.innerHTML = "<h1>Failed to load image. Path: " + img.src + "</h1>";
}
</script>
</body>
</html>
